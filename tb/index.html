<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#F4F6F3">
<title>성남 택배 통합발송 사업</title>
<style>
  :root{
    --ground:#F4F6F3; --surface:#FFFFFF; --ink:#17211C; --ink-soft:#4A574F; --ink-faint:#7C877F;
    --line:#DDE3DA; --accent:#2F6F5E; --accent-soft:#E4EFE9; --money:#9C6B1F; --money-soft:#F6EBD6;
    --shadow:0 1px 2px rgba(20,30,25,.04),0 10px 28px rgba(20,30,25,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ground);color-scheme:light}
  body{font-family:'Apple SD Gothic Neo','Pretendard',system-ui,-apple-system,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.6;padding:clamp(22px,6vw,44px) clamp(18px,5vw,32px);
    min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  .inner{max-width:560px;margin:0 auto;width:100%}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--accent)}
  h1{font-size:clamp(24px,6vw,32px);font-weight:800;letter-spacing:-.02em;margin:.4em 0 .3em;line-height:1.15}
  .sub{color:var(--ink-soft);font-size:14.5px;margin-bottom:26px}
  .menu{display:flex;flex-direction:column;gap:13px}
  a.item{display:flex;align-items:center;gap:15px;text-decoration:none;color:inherit;
    background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:17px 18px;box-shadow:var(--shadow);
    transition:transform .12s ease, border-color .12s ease}
  a.item:active{transform:scale(.985)}
  a.item:hover{border-color:var(--accent)}
  .ic{flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:var(--accent-soft);display:grid;place-items:center;font-size:23px}
  .item.sim .ic{background:var(--money-soft)}
  .tx{flex:1;min-width:0}
  .tx .t{font-size:16.5px;font-weight:750}
  .tx .d{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
  .arw{flex:0 0 auto;color:var(--ink-faint);font-size:20px}
  .note{margin-top:14px;display:flex;gap:11px;align-items:flex-start;background:var(--money-soft);border-radius:13px;padding:14px 16px}
  .note .ic2{font-size:18px;flex:0 0 auto}
  .note .nt{font-size:12.5px;color:#6f5115;line-height:1.6}
  .note .nt b{color:var(--money)}
  .foot{margin-top:22px;font-size:11.5px;color:var(--ink-faint);line-height:1.7;text-align:center}
</style>
</head>
<body>
  <div class="inner">
    <div class="eyebrow">성남 지식산업센터</div>
    <h1>택배 통합발송 사업</h1>
    <p class="sub">신성일 대표 · 성대표 공동사업 · 아래 항목을 눌러 보세요</p>
    <div class="menu">
      <a class="item" href="roadmap.html">
        <div class="ic">📦</div>
        <div class="tx"><div class="t">사업 로드맵</div><div class="d">수익구조 · 4단계 성장전략 · 역할분담</div></div>
        <div class="arw">›</div>
      </a>
      <a class="item sim" href="simulator.html">
        <div class="ic">🧮</div>
        <div class="tx"><div class="t">정산 시뮬레이터</div><div class="d">숫자를 바꿔 순이익·50:50 배분 계산</div></div>
        <div class="arw">›</div>
      </a>
    </div>
    <div class="note">
      <div class="ic2">🔒</div>
      <div class="nt"><b>역할·수익분배 합의서</b>는 실명·민감정보가 있어 공개 링크에서 제외했습니다. PDF로 따로 전달드립니다.</div>
    </div>
    <div class="foot">밝은 화면 고정 · 폰·컴퓨터 어디서나 열림 · 검색 노출 차단(noindex)</div>
  </div>
</body>
</html>
